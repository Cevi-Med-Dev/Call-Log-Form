  <section class="leftColumn">
    <img src="./assets/img/column.jpg" alt="">

  <section id="formContainer">
    <img id="logo" src="./assets/img/logo.png" alt="">
    <form target="_blank"
      action="https://n8n.cevispace.com/webhook/customer-service-call-form"

      <section id="fields">
        <section id="flags" class="animate__animated animate__bounceInLeft">

          <div>

              <option value="High❗">High ❗</option>
              <option value="Urgent ⚠️❗">Urgent ⚠️❗</option>
            </select>
          </div>

          <br>
          <div>

            <Select id="CSA" class="input blackTxt animate__animated animate__bounceInLeft" name="CSA" type="text">

              <option value="Jacob">Jacob</option>
              <option value="Niki">Niki</option>
              <option value="Meaghan">Meaghan</option>
              <option value="Mateo">Mateo</option>
              <option value="Simon">Simon</option>
              <option value="Robert">Robert</option>
              <option value="Bryan">Bryan</option>
              <option value="Diana">Diana</option>
              <option value="James">James</option>
              <option value="Natally">Natally</option>
              <option value="Adriana">Adriana</option>
              <option value="Lina">Lina</option>
              <option value="Angela">Angela</option>
              <option value="Carina">Carina</option>

            </Select>
            <!-- //depending on the type of the call the other options may guide to a diffrent resolution  -->
            <select class="input" id="Type" name="Type">
              <option value="">Category 📊 </option>
              <option value="🔍 Suspicious Order Verification">Suspicious Order Verification 🔍</option>
              <option value="🚚 Delivery">Delivery 🚚</option>
              <option value="🏥 Insurance Coverage Inquiry">Insurance Coverage Inquiry 🏥</option>
              <option value="🐛 Scammers">Scammers 🐛</option>
              <option value="🏷️ Solicitors">Solicitors 🏷️</option>
              <option value="💸 Sales">Sales 💸</option>
              <option value="🛡️ Warranty">Warranty 🛡️</option>
              <option value="💰 Phone Purchase">Phone Purchase 💰</option>
              <option value="📝 Online Purchase">Online Purchase📝</option>
              <option value="🧾 quoteRequest">Quote Request 🧾</option>
              <option value="😭 grievance">Grievance😭</option>
              <option value="🔄 Order Update">Order Update 🔄</option>
              <option value="❌ Error / Silent Call">Error / Silent Call ❌</option>
              <option value="❓ General Questions">General Question ❓</option>
              <option value="🏦 Accouting / Carina">Accouting / Carina 🏦 </option>
            </select>
          </div>
        </section>
        <aside>
          <div>
            <label for="notes">Reason 💭 </label>
            <input class="animate__animated animate__bounceInLeft input" type="text" name="reason"
              placeholder="Enter Reason for Call">
            <label for="text">Phone 📞</label>
            <input class=" animate__animated animate__bounceInLeft input" type="text" name="cPhone"
              placeholder="Phone # ">
            <label for="text">Email 📧 </label>
            <input class="animate__animated animate__bounceInLeft input" type="text" name="cEmail"
              placeholder="Email Address">
            <label for="text">Invoice 📇</label>
            <input class="animate__animated animate__bounceInLeft input" type="text" name="invoice"
              placeholder="Invoice # ">

          </div>
          <div>
            <label for="text">Name ✍️</label>
            <input id="cName" class="input animate__animated animate__bounceInRight" type="text" name="cName"
              placeholder="Enter Caller's Name">
            <label for="issue">Issue ❌</label>
            <textarea class="input animate__animated animate__bounceInRight" name="issue" rows="2"></textarea>

            <label for="resolution">Resolution or Verbal Agreement 🤝</label>
            <textarea class="input animate__animated animate__bounceInRight" name="resolution" rows="2"></textarea>
            <!-- <label for="notes">Call Notes 📋</label>
                                <textarea class="input animate__animated animate__bounceInLeft" name="notes"
                                    rows="2"></textarea> -->
          </div>



        </aside>
        <hr>
      </section>

      <aside class="input bottom animate__animated animate__bounceInLeft">
        <label class="blackTxt"><input class="assigneeChkBx" type="checkbox" name="assignee" value=""> This call

        <div class="hide splitH" id="assigneeContainer">

            <option value="Carina">Assigned to Carina</option>
            <option value="Niki">Assigned to Niki</option>
            <option value="Meaghan">Assigned to Meaghan</option>
            <option value="Customer-Care">Assigned to Customer Care</option>
          </Select>


        </div>
      </aside>

      <aside id="templateHider" class="hide input ">
        <label class="blackTxt"><input class="template" type="checkbox" name="template" value=""> Send Email to
          Customer </label><br>
        <div class="hide splitH" id="templateContainer">

          <Select id="template" name="template" class="input  animate__animated animate__bounceInRight" name="template"
            type="text">
          </Select>


        </div>
      </aside>

      <div class="btnContainer">

        <hr>
        <button id="wrapUpCall" class="btn" type="submit"> Wrap Up Call </button>
      </div>

    </form>


  </section>
  <section class="rightColumn">

    <div class="container">
      <div class="form-card">
        <h1>📞 Retrieve Customer Data Using Invoice</h1>
        <p class="subtitle">Enter an invoice number to retrieve associated invoices, trips, and call logs from
          n8n</p>

        <form id="dataForm">
          <div class="form-group">
            <label for="invoiceNumber">Invoice Number</label>
            <input type="text" id="invoiceNumber" name="invoiceNumber" placeholder="e.g., INV-2025-001" required>
          </div>

          <button type="submit" class="btn" id="submitBtn">
            🔍 Retrieve Data
          </button>
        </form>
       <div class="toggle-bar">
  <button class="toggle-btn active" data-toggle="comments">Comments</button>
  <button class="toggle-btn" data-toggle="invoices">Invoices</button>
  <button class="toggle-btn" data-toggle="trips">Trips</button>
  <button class="toggle-btn" data-toggle="calls">Calls</button>
</div>


        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>Fetching data from n8n...</p>
        </div>

        <div class="error" id="error"></div>
      </div>

      <div class="results" id="results">


        <div class="data-section">
          <div class="section-header">
            <h2 class="section-title">📄 Invoice Items</h2>
            <span class="badge" id="invoicesBadge">0</span>
          </div>
          <div id="invoicesContent"></div>
        </div>

        <div class="data-section">
          <div class="section-header">
            <h2 class="section-title">🚚 Trips Scheduled </h2>
            <span class="badge" id="tripsBadge">0</span>
          </div>
          <div id="tripsContent"></div>
        </div>

        <div class="data-section">
          <div class="section-header">
            <h2 class="section-title">☎️ Call Logged </h2>
            <span class="badge" id="callsBadge">0</span>
          </div>
          <div id="callsContent"></div>
        </div>
        <div class="data-section">
          <div class="section-header">
            <h2 class="section-title">💬 Comments Logged </h2>
            <span class="badge" id="commentsBadge">0</span>
          </div>
          <div id="commentsContent"></div>
        </div>
      </div>
    </div>
      <footer>
        <small>Please provide Feedback @ Tech@cevimed.com</small>
      </footer>

<style>
  :root {
    --clrp2026-white: #ffffff;
    --clrp2026-accent: #c40c11;
    --clrp2026-black: #000000;
    --clrp2026-muted: #5f5f5f;
  }

  #clrp2026-overlay,
  #clrp2026-overlay * {
    box-sizing: border-box;
  }

  #clrp2026-overlay {
    position: fixed;
    inset: 0;
    z-index: 2147483000;
    display: grid;
    place-items: center;
    min-width: 320px;
    padding: 24px;
    font-family: Arial, Helvetica, sans-serif;
  }

  #clrp2026-overlay.clrp2026-hidden {
    display: none;
  }

  .clrp2026-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.72);
    backdrop-filter: blur(9px);
    -webkit-backdrop-filter: blur(9px);
  }

  .clrp2026-modal {
    position: relative;
    width: min(100%, 520px);
    padding: 34px 32px 30px;
    overflow: hidden;
    color: var(--clrp2026-black);
    text-align: center;
    background:
      linear-gradient(135deg, rgba(196, 12, 17, 0.1), transparent 42%),
      var(--clrp2026-white);
    border: 1px solid rgba(196, 12, 17, 0.34);
    border-radius: 8px;
    box-shadow: 0 28px 80px rgba(0, 0, 0, 0.4);
  }

  .clrp2026-modal::before {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 5px;
    content: "";
    background: var(--clrp2026-accent);
  }

  .clrp2026-mark {
    display: grid;
    place-items: center;
    width: 58px;
    height: 58px;
    margin: 0 auto 18px;
    color: var(--clrp2026-black);
    font-size: 18px;
    font-weight: 800;
    line-height: 1;
    background: var(--clrp2026-accent);
    border-radius: 50%;
    box-shadow: 0 10px 24px rgba(196, 12, 17, 0.24);
  }

  #clrp2026-title {
    margin: 0 0 12px;
    color: var(--clrp2026-black);
    font-size: clamp(24px, 4vw, 34px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: 0;
  }

  .clrp2026-message {
    max-width: 430px;
    margin: 0 auto 26px;
    color: var(--clrp2026-muted);
    font-size: 15px;
    line-height: 1.65;
  }

  .clrp2026-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: min(100%, 310px);
    min-height: 50px;
    padding: 12px 22px;
    color: var(--clrp2026-white);
    font-size: 15px;
    font-weight: 800;
    line-height: 1.2;
    text-align: center;
    cursor: pointer;
    background: var(--clrp2026-accent);
    border: 1px solid var(--clrp2026-accent);
    border-radius: 6px;
    box-shadow: 0 12px 22px rgba(196, 12, 17, 0.22);
    transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
  }

  .clrp2026-primary:hover {
    filter: brightness(1.04);
    transform: translateY(-1px);
    box-shadow: 0 16px 26px rgba(196, 12, 17, 0.28);
  }

  .clrp2026-primary:focus-visible,
  .clrp2026-bypass:focus-visible {
    outline: 3px solid rgba(196, 12, 17, 0.42);
    outline-offset: 3px;
  }

  .clrp2026-bypass {
    display: inline;
    padding: 0;
    color: var(--clrp2026-black);
    font: inherit;

    line-height: inherit;
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
    background: transparent;
    border: 0;
  }

  .clrp2026-bypass:hover {
    color: var(--clrp2026-accent);
  }

  @media (max-width: 420px) {
    #clrp2026-overlay {
      padding: 18px;
    }

    .clrp2026-modal {
      padding: 30px 22px 26px;
    }

    .clrp2026-message {
      font-size: 14px;
    }
  }
</style>
